name: attendance_reminder_app
description: An app that reminds you to punch in/out for work
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  path: ^1.8.0
  path_provider: ^2.0.0
  sqflite: ^2.0.0
  flutter_local_notifications: ^9.0.0
  audioplayers: ^1.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  timezone: ^0.8.0
  flutter_native_timezone: ^2.0.0
  android_intent_plus: ^5.3.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/